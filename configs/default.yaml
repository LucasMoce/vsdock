# vsdock — configuração padrão

screening:
  similarity_threshold: 0.4
  fingerprint: morgan        # morgan | maccs | rdkit
  radius: 2                  # raio para Morgan fingerprint
  max_hits: 500

docking:
  exhaustiveness: 8
  num_modes: 9
  energy_range: 3
  # Caixa de docking (definir por projeto)
  center_x: 0.0
  center_y: 0.0
  center_z: 0.0
  size_x: 20.0
  size_y: 20.0
  size_z: 20.0

admet:
  # Pesos de 0 a 1 — ajuste por projeto
  # Exemplo abaixo: foco em hepatotoxicidade e hERG
  hepatotoxicity: 1.0
  herg_inhibition: 0.8
  blood_brain_barrier: 0.3
  solubility: 0.5
  caco2_permeability: 0.4

filters:
  remove_pains: true
  lipinski: true             # filtra por regra de Lipinski
